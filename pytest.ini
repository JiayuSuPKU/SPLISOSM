[pytest]
pythonpath = src
testpaths = tests
filterwarnings =
    # ome-zarr deprecated Scaler class — triggered at import time, not our code
    ignore::DeprecationWarning:ome_zarr
    # torch.jit.script deprecated in PyTorch ≥ 2.5 — triggered by a transitive dependency
    ignore::DeprecationWarning:torch.jit
    # sklearn GP optimisation hit hyperparameter bounds — expected in short test runs
    ignore::sklearn.exceptions.ConvergenceWarning
    # linear_operator adds jitter to non-positive-definite matrices — expected numerical behaviour
    ignore::linear_operator.utils.warnings.NumericalWarning
    # PyTorch MPS backend internally resizes linalg.solve output — not a splisosm bug
    ignore:An output with one or more elements was resized:UserWarning
